  <path d="M32 60 Q38 44 50 40 Q62 44 68 60" fill="none" stroke="#a78bfa" stroke-width="3"/>
  <path d="M32 60 Q38 76 50 80 Q62 76 68 60" fill="none" stroke="#a78bfa" stroke-width="3"/>
  <circle cx="42" cy="52" r="3" fill="#a78bfa"/>
  <circle cx="58" cy="52" r="3" fill="#a78bfa"/>
  <!-- NOSHY text -->
  <text x="90" y="72" font-size="42" class="text">NOSHY</text>
  <!-- Subtitle -->
